<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body { font-family: Arial; background:#f4f6f9; padding:20px; }
.box { background:white; padding:20px; border-radius:10px; }
input, select, button {
  width:100%; padding:10px; margin-top:10px;
}
button { background:#1f3b63; color:white; border:none; }
</style>
</head>

<body>

<div class="box" id="loginBox">
<h2>Admin Login</h2>
<input type="password" id="pass" placeholder="Enter Password">
<button onclick="login()">Login</button>
</div>

<div class="box" id="panel" style="display:none;">
<h2>Update Tracking</h2>

<input id="code" placeholder="Tracking Code">

<select id="status">
<option>Shipped</option>
<option>In Transit</option>
<option>On Hold</option>
<option>Delivered</option>
</select>

<input id="location" placeholder="Location">

<button onclick="save()">Save</button>
</div>

<script>
let password = "admin123"; // CHANGE THIS

function login() {
if(document.getElementById("pass").value === password){
document.getElementById("loginBox").style.display="none";
document.getElementById("panel").style.display="block";
} else {
alert("Wrong password");
}
}

function save() {
let code = document.getElementById("code").value;
let status = document.getElementById("status").value;
let location = document.getElementById("location").value;

let data = JSON.parse(localStorage.getItem("tracking") || "{}");

data[code] = {
status: status,
location: location
};

localStorage.setItem("tracking", JSON.stringify(data));

alert("Saved successfully!");
}
</script>

</body>
</html>
